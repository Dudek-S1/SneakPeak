<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerFirst - Smart Search & Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- PALETA KOLORÓW GEN-Z --- */
        :root {
            --neon-yellow: #E5FF00;
            --hot-pink: #FF0066;
            --deep-black: #111111;
            --white: #FFFFFF;
            --bg-light: #F4F4F5;
            --text-muted: #71717A;
            --border-light: #E4E4E7;
            --card-radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; background-color: var(--bg-light); color: var(--deep-black); overflow: hidden; }

        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }

        /* --- 1. GÓRNY PASEK NAWIGACJI (HEADER) --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 16px 32px; border-bottom: 2px solid var(--deep-black); z-index: 2000;
        }
        .brand { 
            display: flex; 
            align-items: center; /* Zmiana z baseline na center dla lepszego wyrównania z obrazkiem */
            gap: 12px; 
        }

        .brand-logo {
            height: 32px; /* Ta wysokość sprawi, że logo będzie wielkością zbliżone do starego tekstu */
            width: auto; /* Szerokość dopasuje się automatycznie do proporcji 2555x416 */
            display: block;
        }
        .brand p { color: var(--text-muted); font-weight: 800; font-size: 13px; text-transform: uppercase;}
        
        .nav-menu { display: flex; gap: 16px; }
        .nav-btn {
            padding: 12px 24px; border-radius: 99px; border: 2px solid transparent; background: var(--bg-light);
            cursor: pointer; font-weight: 800; transition: 0.2s; font-size: 14px; color: var(--text-muted); display: flex; align-items: center; justify-content: center;
        }
        .nav-btn.active { background: var(--neon-yellow); color: var(--deep-black); border-color: var(--deep-black); }
        .nav-btn:hover:not(.active) { border-color: var(--hot-pink); color: var(--deep-black); }

        /* --- SYSTEM WIDOKÓW --- */
        .main-content { flex-grow: 1; display: flex; overflow: hidden; position: relative; }
        .view { height: 100%; width: 100%; display: none; overflow-y: auto; }
        .view.active { display: flex; }

        /* --- 2. WIDOK MAPY Z LEWYM PANELEM --- */
        #view-map { flex-direction: row; }
        
        /* LEWY PANEL (Feed Ofert) */
        .left-panel {
            width: 420px; background: var(--bg-light); display: flex; flex-direction: column;
            border-right: 2px solid var(--deep-black); z-index: 1000; flex-shrink: 0;
        }
        
        .panel-header { background: var(--white); padding: 24px; border-bottom: 2px solid var(--deep-black); }
        
        .top-search {
            background: var(--white); padding: 12px 20px; border-radius: 12px; margin-bottom: 16px;
            display: flex; align-items: center; border: 2px solid var(--deep-black); box-shadow: 4px 4px 0px var(--deep-black);
            transition: 0.2s;
        }
        .top-search:focus-within { box-shadow: 6px 6px 0px var(--hot-pink); transform: translate(-2px, -2px); }
        .top-search input { border: none; outline: none; width: 100%; padding: 4px 8px; font-size: 15px; font-weight: 600; }

        .map-filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-pill {
            padding: 8px 14px; background: var(--white); border: 2px solid var(--deep-black);
            border-radius: 99px; font-weight: 800; font-size: 11px; text-transform: uppercase;
            cursor: pointer; transition: 0.2s; box-shadow: 2px 2px 0px var(--deep-black); color: var(--deep-black);
        }
        .filter-pill:hover:not(.active) { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--deep-black); }
        .filter-pill.active { background: var(--neon-yellow); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--deep-black); }

        /* Lista Ofert */
        .offers-list { flex-grow: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        
        .mini-card {
            background: var(--white); border: 2px solid var(--deep-black); border-radius: 16px;
            padding: 16px; box-shadow: 4px 4px 0px var(--deep-black); cursor: pointer; transition: 0.2s;
            display: flex; gap: 16px; align-items: center;
        }
        .mini-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--hot-pink); border-color: var(--hot-pink); }
        .mc-icon { width: 56px; height: 56px; border-radius: 12px; border: 2px solid var(--deep-black); overflow: hidden; flex-shrink: 0; background: var(--bg-light); }
        .mc-icon img { width: 100%; height: 100%; object-fit: cover; }
        .mc-info { flex-grow: 1; }
        .mc-info h4 { font-size: 15px; font-weight: 900; margin-bottom: 4px; line-height: 1.2; }
        .mc-info p { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;}
        
        /* Kontener Mapy */
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; position: absolute; top:0; left:0; z-index: 1; }

        /* --- STYLIZACJA MAPY (POP-UP I ZNACZNIKI) --- */
        .leaflet-popup-content-wrapper { border-radius: var(--card-radius); padding: 0; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 2px solid var(--deep-black); }
        .leaflet-popup-content { margin: 0; width: 280px !important; }
        .company-card { background: var(--white); }
        .company-header { background: var(--neon-yellow); padding: 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid var(--deep-black); }
        .company-icon-wrap { width: 48px; height: 48px; background: var(--white); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid var(--deep-black); box-shadow: 2px 2px 0px var(--deep-black); overflow: hidden; }
        .company-icon-img { width: 100%; height: 100%; object-fit: cover; }
        .company-title h4 { font-size: 16px; font-weight: 900; line-height: 1.2; }
        .company-tag { font-size: 10px; font-weight: 800; background: var(--white); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 6px; border: 1px solid var(--deep-black); }
        .company-info { padding: 20px; }
        
        .seats-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-light); color: var(--deep-black); padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 900; border: 1px solid var(--border-light); margin-bottom: 12px; }
        .seats-badge.low { background: var(--hot-pink); color: var(--white); border-color: var(--hot-pink); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 102, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 102, 0); } }

        .company-info p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; font-weight: 600; }
        .action-buttons { display: flex; flex-direction: column; gap: 8px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--hot-pink); color: var(--white); border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover:not(:disabled) { background: #e6005c; transform: translateY(-2px); }
        .btn-primary:disabled { background: var(--deep-black); color: var(--neon-yellow); cursor: default; }
        .btn-secondary { width: 100%; padding: 12px; background: transparent; color: var(--deep-black); border: 2px solid var(--deep-black); border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-secondary:hover { background: var(--border-light); }

        .custom-marker { background: var(--deep-black); border: 3px solid var(--neon-yellow); border-radius: 50%; box-shadow: 0 8px 16px rgba(0,0,0,0.2); text-align: center; line-height: 34px; font-size: 18px; transition: transform 0.2s; overflow: hidden; }
        .custom-marker img { width: 100%; height: 100%; object-fit: cover; }
        .custom-marker:hover { transform: scale(1.15) translateY(-5px); border-color: var(--hot-pink); z-index: 1000 !important; }

        /* --- 3. WIDOK PROFILU --- */
        #view-profile { display: none; width: 100%; }
        #view-profile.active { display: block; }
        .container-padding { padding: 40px 60px; max-width: 1400px; margin: 0 auto; width: 100%;}
        .section-title { font-size: 32px; font-weight: 900; margin-bottom: 24px; text-transform: uppercase; letter-spacing: -1px;}
        .upcoming-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .upcoming-card { background: var(--white); border: 2px solid var(--deep-black); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 4px 4px 0px var(--deep-black); }
        .uc-icon { font-size: 32px; background: var(--bg-light); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid var(--border-light); overflow: hidden;}
        .uc-info h4 { font-size: 16px; font-weight: 900; }
        .uc-info p { font-size: 13px; color: var(--hot-pink); font-weight: 800; margin-top: 4px;}

        /* --- 4. WIDOK SZCZEGÓŁÓW OFERTY --- */
        #view-details { display: none; width: 100%; }
        #view-details.active { display: block; }
        .back-btn { background: transparent; border: none; font-size: 16px; font-weight: 800; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 24px; transition: 0.2s; }
        .back-btn:hover { color: var(--deep-black); }
        
        .detail-banner { background: var(--neon-yellow); border: 4px solid var(--deep-black); border-radius: 32px; padding: 50px; display: flex; align-items: center; gap: 30px; box-shadow: 8px 8px 0px var(--deep-black); margin-bottom: 40px; }
        .detail-banner-icon { font-size: 70px; background: var(--white); width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 24px; border: 4px solid var(--deep-black); overflow: hidden; }
        .detail-banner-text h1 { font-size: 48px; font-weight: 900; line-height: 1; margin-bottom: 10px; letter-spacing: -2px; }
        .detail-banner-text h3 { font-size: 20px; font-weight: 800; color: var(--deep-black); opacity: 0.7; text-transform: uppercase; }

        .detail-layout { display: grid; grid-template-columns: 7fr 3fr; gap: 40px; align-items: start; }
        .detail-left section { background: var(--white); border: 2px solid var(--border-light); border-radius: 24px; padding: 40px; margin-bottom: 24px; }
        .detail-left h2 { font-size: 24px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .detail-left p { font-size: 16px; color: var(--text-muted); line-height: 1.7; font-weight: 500; }
        
        .schedule-list { list-style: none; }
        .schedule-list li { display: flex; gap: 20px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px dashed var(--border-light); }
        .schedule-list li:last-child { border: none; margin: 0; padding: 0; }
        .schedule-time { font-weight: 900; color: var(--hot-pink); min-width: 70px; }
        .schedule-desc { font-weight: 600; color: var(--deep-black); }

        .detail-right { position: sticky; top: 40px; }
        .ticket-card { background: var(--white); border: 3px solid var(--deep-black); border-radius: 24px; padding: 32px; box-shadow: 8px 8px 0px var(--deep-black); }
        .ticket-header { border-bottom: 2px solid var(--border-light); padding-bottom: 20px; margin-bottom: 20px; }
        .ticket-header p { font-size: 14px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .ticket-header h3 { font-size: 20px; font-weight: 900; color: var(--hot-pink); margin-bottom: 12px;}
        
        .checkbox-wrapper { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; }
        .checkbox-wrapper input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--hot-pink); cursor: pointer; margin-top: 2px; }
        .checkbox-wrapper label { font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; line-height: 1.4; }
        .checkbox-wrapper label a { color: var(--deep-black); font-weight: 800; text-decoration: underline; }
        .btn-ticket { width: 100%; padding: 20px; font-size: 18px; border-radius: 16px; }
    
        .badge-card {
    background: var(--white);
    border: 3px solid var(--deep-black);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 6px 6px 0px var(--neon-yellow);
    transition: 0.3s;
}

.badge-card:hover {
    transform: rotate(-2deg) scale(1.05);
    box-shadow: 8px 8px 0px var(--hot-pink);
}

.badge-icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
}

.badge-name {
    font-weight: 900;
    text-transform: uppercase;
    font-size: 13px;
    display: block;
}

.badge-locked {
    filter: grayscale(1);
    opacity: 0.5;
    box-shadow: 4px 4px 0px var(--border-light);
}
.badge-progress-container {
    width: 100%;
    height: 12px;
    background: var(--bg-light);
    border: 2px solid var(--deep-black);
    border-radius: 99px;
    margin-top: 10px;
    overflow: hidden;
    position: relative;
}

.badge-progress-bar {
    height: 100%;
    background: var(--neon-yellow);
    border-right: 2px solid var(--deep-black);
    transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.badge-count {
    font-size: 10px;
    font-weight: 900;
    margin-top: 4px;
    display: block;
    color: var(--text-muted);
}
    
    </style>
</head>

    let savedWorkshops = [];

    // --- 3. SILNIK WYSZUKIWANIA I FILTROWANIA ---
    function getFilteredCompanies() {
        const query = document.getElementById('main-search-input').value.toLowerCase().trim();
        const activeCategory = document.querySelector('.filter-pill.active').getAttribute('data-category');

        return companies.filter(company => {
            const categoryMatch = activeCategory === 'all' || company.category === activeCategory;
            const searchableText = `${company.name} ${company.city} ${company.title} ${company.category} ${company.tag}`.toLowerCase();
            const textMatch = query === '' || searchableText.includes(query);
            return categoryMatch && textMatch;
        });
    }

    function updateApp() {
        const filteredData = getFilteredCompanies();
        renderMarkers(filteredData);
        renderOffersList(filteredData);
        
        const query = document.getElementById('main-search-input').value.trim();
        if (query !== '' && filteredData.length > 0) {
            const latLngs = filteredData.map(c => [c.lat, c.lng]);
            const bounds = L.latLngBounds(latLngs);
            map.flyToBounds(bounds.pad(0.2), { duration: 0.8 });
        } else if (query === '') {
            map.flyTo([50.0413, 21.9990], 13, { duration: 0.8 });
        }
    }

    document.getElementById('main-search-input').addEventListener('input', updateApp);
    document.querySelectorAll('.filter-pill').forEach(pill => {
        pill.addEventListener('click', (e) => {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            e.target.classList.add('active');
            updateApp();
        });
    });

    // --- 4. Renderowanie Markerów ---
   function renderMarkers(dataToRender) {
    Object.values(mapMarkers).forEach(m => map.removeLayer(m));
    mapMarkers = {};

    dataToRender.forEach(company => {
        const imgHtml = `<img src="${company.icon}" onerror="this.src='${getFallback(company.name)}'">`;
        const customIcon = L.divIcon({ 
            className: 'custom-marker', 
            html: imgHtml, 
            iconSize: [44, 44], 
            iconAnchor: [22, 44], 
            popupAnchor: [0, -44] 
        });

        const isSaved = savedWorkshops.some(saved => saved.id === company.id);
        const isFull = company.availableSeats === 0;
        
        let btnZapisz = "";
        if (isSaved) {
            btnZapisz = `<button class="btn-primary" disabled>Zapisano ✓</button>`;
        } else if (isFull) {
            btnZapisz = `<button class="btn-primary" disabled style="background: var(--text-muted); color: white; border-color: var(--text-muted);">Brak miejsc 😔</button>`;
        } else {
            // Używamy window.quickSignUp
            btnZapisz = `<button class="btn-primary" onclick="window.quickSignUp(${company.id})">Szybki Zapis</button>`;
        }

        const seatsClass = company.availableSeats <= 1 ? 'low' : '';

        const popupContent = `
            <div class="company-card">
                <div class="company-header">
                    <div class="company-icon-wrap">${imgHtml}</div>
                    <div class="company-title">
                        <h4>${company.name}</h4>
                        <span class="company-tag">${company.city}</span>
                    </div>
                </div>
                <div class="company-info">
                    <div class="seats-badge ${seatsClass}">🔥 Zostało miejsc: ${company.availableSeats}</div>
                    <p><strong>📅 ${company.date}</strong><br/>${company.desc}</p>
                    <div class="action-buttons">
                        ${btnZapisz}
                        <button class="btn-secondary" onclick="window.openDetails(${company.id})">Dowiedz się więcej</button>
                    </div>
                </div>
            </div>
        `;

        const marker = L.marker([company.lat, company.lng], { icon: customIcon }).bindPopup(popupContent).addTo(map);
        mapMarkers[company.id] = marker; 
    });
}

    // --- 5. Renderowanie Listy (Feedu) ---
    function renderOffersList(dataToRender) {
        const listContainer = document.getElementById('offers-list');
        listContainer.innerHTML = '';
        
        if(dataToRender.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--text-muted); font-weight:600;">Nie znaleziono wyników dla Twoich kryteriów. 🥺</div>`;
            return;
        }

        dataToRender.forEach(company => {
            const isFull = company.availableSeats === 0;
            const seatsHTML = isFull 
                ? `<span style="color:red; font-size:11px; font-weight:800;">BRAK MIEJSC</span>` 
                : `<span style="color:var(--hot-pink); font-size:11px; font-weight:800;">${company.availableSeats} MIEJSC</span>`;
            
            const imgHtml = `<img src="${company.icon}" onerror="this.src='${getFallback(company.name)}'">`;

            listContainer.innerHTML += `
                <div class="mini-card" onclick="focusMarker(${company.id})">
                    <div class="mc-icon">${imgHtml}</div>
                    <div class="mc-info">
                        <h4>${company.name}</h4>
                        <p>${company.title}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="company-tag">📍 ${company.city}</span>
                            ${seatsHTML}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function focusMarker(companyId) {
        const company = companies.find(c => c.id === companyId);
        map.setView([company.lat, company.lng], 15, { animate: true, duration: 0.5 });
        if(mapMarkers[companyId]) {
            setTimeout(() => { mapMarkers[companyId].openPopup(); }, 500); 
        }
    }

    // --- 6. Strona Szczegółów ---
    function openDetails(companyId) {
        const company = companies.find(c => c.id === companyId);
        const container = document.getElementById('details-content-area');
        
        const isSaved = savedWorkshops.some(saved => saved.id === company.id);
        const isFull = company.availableSeats === 0;
        
        let btnHtml = "";
        if (isSaved) btnHtml = `<button class="btn-primary btn-ticket" disabled>Jesteś na liście! ✓</button>`;
        else if (isFull) btnHtml = `<button class="btn-primary btn-ticket" disabled style="background: var(--text-muted);">Brak wolnych miejsc</button>`;
        else btnHtml = `<button class="btn-primary btn-ticket" onclick="detailsSignUp(${company.id})">Zapisz się teraz</button>`;

        const seatsClass = company.availableSeats <= 1 ? 'color: var(--hot-pink);' : 'color: var(--deep-black);';
        const imgHtml = `<img src="${company.icon}" class="company-icon-img" onerror="this.src='${getFallback(company.name)}'">`;

        container.innerHTML = `
            <button class="back-btn" onclick="switchView('map')">← Wróć do mapy i feedu</button>
            <div class="detail-banner">
                <div class="detail-banner-icon">${imgHtml}</div>
                <div class="detail-banner-text">
                    <h3>${company.name} (📍 ${company.city})</h3>
                    <h1>${company.title}</h1>
                </div>
            </div>
            <div class="detail-layout">
                <div class="detail-left">
                    <section><h2>📖 O warsztacie</h2><p>${company.fullDesc}</p></section>
                    <section><h2>⏱️ Harmonogram dnia</h2><ul class="schedule-list">
                        ${company.schedule.map(s => `<li><span class="schedule-time">${s.time}</span><span class="schedule-desc">${s.event}</span></li>`).join('')}
                    </ul></section>
                </div>
                <div class="detail-right">
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <p>Termin wizyty</p>
                            <h3>${company.date}</h3>
                            <p style="margin-top:4px; font-weight:800; color:var(--deep-black); margin-bottom:12px;">${company.time}</p>
                            <div style="font-size: 14px; font-weight: 900; ${seatsClass}">🔥 Wolne miejsca: ${company.availableSeats}</div>
                        </div>
                        ${(!isSaved && !isFull) ? `
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="terms-checkbox">
                            <label for="terms-checkbox">Akceptuję <a>Regulamin</a>.</label>
                        </div>` : ''}
                        ${btnHtml}
                    </div>
                </div>
            </div>
        `;
        switchView('details');
        window.scrollTo(0, 0);
    }

    // --- 7. Logika Rezerwacji Miejsc ---
    function quickSignUp(companyId) {
        processSignUp(companyId);
        alert("Zapisano pomyślnie! Miejsce zarezerwowane.");
    }

    function detailsSignUp(companyId) {
        if (!document.getElementById('terms-checkbox').checked) { alert("Musisz zaakceptować regulamin! 📜"); return; }
        processSignUp(companyId);
        alert("Świetnie! Twoje miejsce jest zarezerwowane.");
    }

    function processSignUp(companyId) {
        const company = companies.find(c => c.id === companyId);
        if (!savedWorkshops.includes(company) && company.availableSeats > 0) {
            company.availableSeats--; 
            savedWorkshops.push(company);
            renderUpcoming();
            updateApp();
            
            if(document.getElementById('view-details').classList.contains('active')) {
                openDetails(companyId);
            }
        }
    }

    // Dane o odznakach - możesz to potem przenieść do bazy
const availableBadges = [
    { id: 'first_step', name: 'Pierwszy Krok', icon: '🚀', category: 'all', goal: 1 },
    { id: 'tech_ninja', name: 'Tech Ninja', icon: '💻', category: 'tech', goal: 2 },
    { id: 'creative', name: 'Artysta', icon: '🎨', category: 'design', goal: 4 },
    { id: 'foodie', name: 'Smakosz', icon: '🍔', category: 'kuchnia', goal: 2 }
];

// --- 8. Renderowanie Profilu ---
function renderUpcoming() {
    const listContainer = document.getElementById('upcoming-list');
    
    if (savedWorkshops.length === 0) {
        listContainer.innerHTML = `<div style="grid-column: 1/-1; padding: 20px; border: 2px dashed var(--border-light); border-radius: 16px; text-align: center; color: var(--text-muted); font-weight: 600;">Brak zapisów. Przejdź do Feedu!</div>`;
        renderBadges(); // Odśwież też odznaki (będą zablokowane)
        return;
    }

    listContainer.innerHTML = savedWorkshops.map(company => `
        <div class="upcoming-card">
            <div class="uc-icon"><img src="${company.icon}" class="company-icon-img" onerror="this.src='${getFallback(company.name)}'"></div>
            <div class="uc-info">
                <h4>${company.title}</h4>
                <p>🏢 ${company.name} | 📅 ${company.date}</p>
            </div>
        </div>
    `).join('');

    renderBadges();
}



function renderBadges() {
    const badgesContainer = document.getElementById('badges-container');
    
    // Pobieramy kategorie z zapisanych warsztatów
    const userCategories = savedWorkshops.map(c => c.category);

    badgesContainer.innerHTML = availableBadges.map(badge => {
        let currentProgress = 0;

        // Obliczamy progres
        if (badge.category === 'all') {
            currentProgress = savedWorkshops.length;
        } else {
            currentProgress = userCategories.filter(cat => cat === badge.category).length;
        }

        const isUnlocked = currentProgress >= badge.goal;
        const progressPercent = Math.min((currentProgress / badge.goal) * 100, 100);

        return `
            <div class="badge-card ${isUnlocked ? '' : 'badge-locked'}">
                <span class="badge-icon">${badge.icon}</span>
                <span class="badge-name">${badge.name}</span>
                
                <div class="badge-progress-container">
                    <div class="badge-progress-bar" style="width: ${progressPercent}%"></div>
                </div>
                
                <span class="badge-count">${isUnlocked ? 'UKOŃCZONO ✓' : `PROGRES: ${currentProgress}/${badge.goal}`}</span>
            </div>
        `;
    }).join('');
}

    // --- 9. Nawigacja (POPRAWIONA LOGIKA) ---
    function switchView(viewId, navBtn = null) {
        // Ukryj wszystkie widoki
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        // Pokaż wybrany
        const targetView = document.getElementById('view-' + viewId);
        if (targetView) targetView.classList.add('active');

        // Resetuj wszystkie przyciski nav-btn
        const allNavButtons = document.querySelectorAll('.nav-btn');
        allNavButtons.forEach(b => b.classList.remove('active'));

        if(navBtn) {
            // Jeśli kliknięto przycisk fizycznie
            navBtn.classList.add('active');
        } else {
            // Jeśli wywołano z kodu (np. przez parametr URL)
            // Szukamy przycisku po tekście lub akcji, by uniknąć problemów z indeksami
            if (viewId === 'map') {
                const mapBtn = Array.from(allNavButtons).find(btn => btn.innerText.includes('MAPA'));
                if (mapBtn) mapBtn.classList.add('active');
            } else if (viewId === 'profile') {
                const profileBtn = Array.from(allNavButtons).find(btn => btn.innerText.includes('PROFIL'));
                if (profileBtn) profileBtn.classList.add('active');
            }
        }

        // Odśwież rozmiar mapy jeśli przełączono na mapę
        if (viewId === 'map') {
            setTimeout(() => { map.invalidateSize(); }, 100);
        }
    }

    // --- 10. Odbiornik parametrów URL (NOWE - NAPRAWA) ---
    window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const viewFromUrl = urlParams.get('view'); // szuka 'map' lub 'profile'

        if (viewFromUrl) {
            // Wywołujemy z lekkim opóźnieniem, by mieć pewność że DOM jest gotowy
            setTimeout(() => {
                switchView(viewFromUrl);
            }, 50);
        }
    });

    // START APLIKACJI
    updateApp();
    renderUpcoming();
</script>

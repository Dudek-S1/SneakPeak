<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerFirst - Mapa, Profil i Szczegóły</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- PALETA KOLORÓW GEN-Z --- */
        :root {
            --neon-yellow: #E5FF00;
            --hot-pink: #FF0066;
            --deep-black: #111111;
            --white: #FFFFFF;
            --bg-light: #F4F4F5;
            --text-muted: #71717A;
            --border-light: #E4E4E7;
            --card-radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; background-color: var(--bg-light); color: var(--deep-black); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* --- 1. SIDEBAR --- */
        .sidebar {
            width: 340px; background: var(--white); padding: 32px 24px;
            z-index: 1000; display: flex; flex-direction: column; gap: 28px;
            border-right: 1px solid var(--border-light);
        }
        .brand h1 { font-weight: 900; font-size: 32px; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 4px; }
        .brand span { color: var(--hot-pink); }
        .brand p { color: var(--text-muted); font-weight: 600; font-size: 15px; }
        .nav-menu { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .nav-btn {
            padding: 16px; border-radius: 16px; border: 2px solid transparent; background: var(--bg-light);
            cursor: pointer; font-weight: 800; text-align: left; transition: 0.2s; font-size: 14px; color: var(--text-muted);
        }
        .nav-btn.active { background: var(--deep-black); color: var(--neon-yellow); border-color: var(--deep-black); }
        .nav-btn:hover:not(.active) { border-color: var(--hot-pink); color: var(--deep-black); }

        /* --- SYSTEM WIDOKÓW --- */
        .view { flex-grow: 1; height: 100%; position: relative; display: none; overflow-y: auto; }
        .view.active { display: block; }

        /* --- 2. WIDOK MAPY --- */
        #map { height: 100%; width: 100%; z-index: 1; position: absolute; top:0; left:0; }
        .top-search {
            position: absolute; top: 32px; left: 30px; z-index: 1000;
            background: var(--white); padding: 12px 24px; border-radius: 99px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06); display: flex; align-items: center; width: 400px; border: 1px solid var(--border-light);
        }
        .top-search input { border: none; outline: none; width: 100%; padding: 8px; font-size: 16px; font-weight: 600; }

        /* Karty Pop-up na mapie */
        .leaflet-popup-content-wrapper { border-radius: var(--card-radius); padding: 0; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 2px solid var(--deep-black); }
        .leaflet-popup-content { margin: 0; width: 280px !important; }
        .company-card { background: var(--white); }
        .company-header { background: var(--neon-yellow); padding: 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid var(--deep-black); }
        .company-icon-wrap {
            width: 44px; height: 44px; background: var(--white); border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 22px; border: 2px solid var(--deep-black); box-shadow: 2px 2px 0px var(--deep-black);
        }
        .company-title h4 { font-size: 16px; font-weight: 900; line-height: 1.2; }
        .company-tag { font-size: 10px; font-weight: 800; background: var(--white); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 6px; border: 1px solid var(--deep-black); }
        .company-info { padding: 20px; }
        .company-info p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; font-weight: 600; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 8px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--hot-pink); color: var(--white); border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover:not(:disabled) { background: #e6005c; transform: translateY(-2px); }
        .btn-primary:disabled { background: var(--deep-black); color: var(--neon-yellow); cursor: default; }
        .btn-secondary { width: 100%; padding: 12px; background: transparent; color: var(--deep-black); border: 2px solid var(--deep-black); border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-secondary:hover { background: var(--border-light); }

        .custom-marker { background: var(--deep-black); border: 3px solid var(--neon-yellow); border-radius: 50%; box-shadow: 0 8px 16px rgba(0,0,0,0.2); text-align: center; line-height: 34px; font-size: 18px; transition: transform 0.2s; }
        .custom-marker:hover { transform: scale(1.15) translateY(-5px); border-color: var(--hot-pink); z-index: 1000 !important; }

        /* --- 3. WIDOK PROFILU --- */
        .container-padding { padding: 40px 60px; max-width: 1400px; margin: 0 auto; }
        .section-title { font-size: 32px; font-weight: 900; margin-bottom: 24px; text-transform: uppercase; letter-spacing: -1px;}
        .upcoming-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .upcoming-card { background: var(--white); border: 2px solid var(--deep-black); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 4px 4px 0px var(--deep-black); }
        .uc-icon { font-size: 32px; background: var(--bg-light); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid var(--border-light);}
        .uc-info h4 { font-size: 16px; font-weight: 900; }
        .uc-info p { font-size: 13px; color: var(--hot-pink); font-weight: 800; margin-top: 4px;}

        /* --- 4. WIDOK SZCZEGÓŁÓW OFERTY --- */
        .back-btn { background: transparent; border: none; font-size: 16px; font-weight: 800; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 24px; transition: 0.2s; }
        .back-btn:hover { color: var(--deep-black); }
        
        /* Baner Górny */
        .detail-banner {
            background: var(--neon-yellow); border: 4px solid var(--deep-black); border-radius: 32px;
            padding: 50px; display: flex; align-items: center; gap: 30px; box-shadow: 8px 8px 0px var(--deep-black);
            margin-bottom: 40px;
        }
        .detail-banner-icon { font-size: 70px; background: var(--white); width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 24px; border: 4px solid var(--deep-black); }
        .detail-banner-text h1 { font-size: 48px; font-weight: 900; line-height: 1; margin-bottom: 10px; letter-spacing: -2px; }
        .detail-banner-text h3 { font-size: 20px; font-weight: 800; color: var(--deep-black); opacity: 0.7; text-transform: uppercase; }

        /* Układ 70% / 30% */
        .detail-layout { display: grid; grid-template-columns: 7fr 3fr; gap: 40px; align-items: start; }
        
        /* Lewa Kolumna */
        .detail-left section { background: var(--white); border: 2px solid var(--border-light); border-radius: 24px; padding: 40px; margin-bottom: 24px; }
        .detail-left h2 { font-size: 24px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .detail-left p { font-size: 16px; color: var(--text-muted); line-height: 1.7; font-weight: 500; }
        
        .schedule-list { list-style: none; }
        .schedule-list li { display: flex; gap: 20px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px dashed var(--border-light); }
        .schedule-list li:last-child { border: none; margin: 0; padding: 0; }
        .schedule-time { font-weight: 900; color: var(--hot-pink); min-width: 70px; }
        .schedule-desc { font-weight: 600; color: var(--deep-black); }

        /* Prawa Kolumna (Karta Akcji) */
        .detail-right { position: sticky; top: 40px; }
        .ticket-card { background: var(--white); border: 3px solid var(--deep-black); border-radius: 24px; padding: 32px; box-shadow: 8px 8px 0px var(--deep-black); }
        .ticket-header { border-bottom: 2px solid var(--border-light); padding-bottom: 20px; margin-bottom: 20px; }
        .ticket-header p { font-size: 14px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .ticket-header h3 { font-size: 20px; font-weight: 900; color: var(--hot-pink); }
        
        .checkbox-wrapper { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; }
        .checkbox-wrapper input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--hot-pink); cursor: pointer; margin-top: 2px; }
        .checkbox-wrapper label { font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; line-height: 1.4; }
        .checkbox-wrapper label a { color: var(--deep-black); font-weight: 800; text-decoration: underline; }

        .btn-ticket { width: 100%; padding: 20px; font-size: 18px; border-radius: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="brand">
            <h1>Career<span>First</span></h1>
            <p>Jeden dzień. Prawdziwa kariera.</p>
        </div>
        <div class="nav-menu">
            <button class="nav-btn active" onclick="switchView('map', this)">🗺️ MAPA OFERT</button>
            <button class="nav-btn" onclick="switchView('profile', this)">👤 TWÓJ PROFIL</button>
        </div>
    </div>

    <div id="view-map" class="view active">
        <div class="top-search">
            <span style="font-size: 20px; opacity: 0.5;">🔍</span>
            <input type="text" placeholder="Szukaj miasta...">
        </div>
        <div id="map"></div>
    </div>

    <div id="view-profile" class="view" style="background: var(--bg-light);">
        <div class="container-padding">
            <h2 class="section-title">Cześć, GenZ! 👋</h2>
            
            <h3 class="section-title" style="font-size: 20px; margin-top: 40px;">📅 Nadchodzące wizyty</h3>
            <div id="upcoming-list" class="upcoming-grid"></div>
            
            <h3 class="section-title" style="font-size: 20px;">🏆 Twoje Odznaki (Zablokowane dla podglądu)</h3>
            <div class="upcoming-grid">
                <div class="upcoming-card"><div class="uc-icon" style="filter:grayscale(1); opacity:0.5;">🛡️</div><div class="uc-info"><h4>Strażnik Sieci</h4><p>Postęp: 0/3</p></div></div>
                <div class="upcoming-card"><div class="uc-icon" style="filter:grayscale(1); opacity:0.5;">👨‍🍳</div><div class="uc-info"><h4>Mistrz Smaku</h4><p>Postęp: 0/4</p></div></div>
            </div>
        </div>
    </div>

    <div id="view-details" class="view" style="background: var(--bg-light);">
        <div class="container-padding" id="details-content-area">
            </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 1. Inicjalizacja Mapy ---
    const map = L.map('map', { zoomControl: false }).setView([50.0413, 21.9990], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // --- 2. Baza Danych Firm (Rozszerzona) ---
    const companies = [
        { 
            id: 1, name: "CodeNinja", title: "Dzień z Backend Devem", category: "tech", lat: 50.038, lng: 22.002, icon: "💻", tag: "NOWE", 
            date: "24 Maja 2024", time: "09:00 - 14:00", desc: "Zobacz jak to działa na produkcji.",
            fullDesc: "Zanurz się w świecie kodu! Podczas tego Job Shadowingu zobaczysz, jak wygląda prawdziwy dzień programisty. Nie potrzebujesz żadnego doświadczenia – pokażemy Ci jak pisze się kod, jak współpracuje zespół i jak naprawia się błędy w systemach z których korzystają miliony ludzi.",
            schedule: [
                { time: "09:00", event: "Poranna kawa i intro z zespołem" },
                { time: "09:30", event: "Tour po biurze i poznanie stanowisk" },
                { time: "10:30", event: "Pair programming - piszemy z mentorem!" },
                { time: "13:00", event: "Wspólna pizza 🍕" },
                { time: "14:00", event: "Q&A i zakończenie" }
            ]
        },
        { 
            id: 2, name: "Studio Pixel", title: "Game Design od Kuchni", category: "design", lat: 50.043, lng: 22.005, icon: "🎨", tag: "HOT", 
            date: "28 Maja 2024", time: "10:00 - 15:00", desc: "Proces tworzenia postaci 3D.",
            fullDesc: "Gry to nie tylko zabawa, to potężny przemysł. Odwiedź studio, które tworzy gry indie. Zobaczysz jak powstaje szkic koncepcyjny, w jaki sposób modeluje się postaci w 3D i jak wprawia się je w ruch. Porozmawiasz z artystami i animatorami.",
            schedule: [
                { time: "10:00", event: "Powitanie i zasady panujące w studiu" },
                { time: "10:30", event: "Od konceptu do szkicu - praca działu 2D" },
                { time: "12:00", event: "Magia 3D - podstawy Blendera" },
                { time: "14:30", event: "Testowanie prototypu nowej gry" }
            ]
        },
        { 
            id: 3, name: "Studio Dixel", title: "Game Design od Kuchni", category: "design", lat: 50.023, lng: 22.025, icon: "🎨", tag: "HOT", 
            date: "28 Maja 2024", time: "10:00 - 15:00", desc: "Proces tworzenia postaci 3D.",
            fullDesc: "Gry to nie tylko zabawa, to potężny przemysł. Odwiedź studio, które tworzy gry indie. Zobaczysz jak powstaje szkic koncepcyjny, w jaki sposób modeluje się postaci w 3D i jak wprawia się je w ruch. Porozmawiasz z artystami i animatorami.",
            schedule: [
                { time: "10:00", event: "Powitanie i zasady panujące w studiu" },
                { time: "10:30", event: "Od konceptu do szkicu - praca działu 2D" },
                { time: "18:00", event: "Magia 3D - podstawy Blendera" },
                { time: "14:30", event: "Testowanie prototypu nowej gry" }
            ]
        }
    ];

    let savedWorkshops = [];
    let markers = [];

    // --- 3. Renderowanie Pinezek ---
    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        companies.forEach(company => {
            const customIcon = L.divIcon({ className: 'custom-marker', html: company.icon, iconSize: [40, 40], iconAnchor: [20, 40], popupAnchor: [0, -40] });

            const isSaved = savedWorkshops.some(saved => saved.id === company.id);
            const btnZapisz = isSaved 
                ? `<button class="btn-primary" disabled>Zapisano ✓</button>`
                : `<button class="btn-primary" onclick="quickSignUp(${company.id}, this)">Szybki Zapis</button>`;

            const popupContent = `
                <div class="company-card">
                    <div class="company-header">
                        <div class="company-icon-wrap">${company.icon}</div>
                        <div class="company-title">
                            <h4>${company.name}</h4>
                            <span class="company-tag">${company.tag}</span>
                        </div>
                    </div>
                    <div class="company-info">
                        <p><strong>📅 ${company.date}</strong><br/>${company.desc}</p>
                        <div class="action-buttons">
                            ${btnZapisz}
                            <button class="btn-secondary" onclick="openDetails(${company.id})">Dowiedz się więcej</button>
                        </div>
                    </div>
                </div>
            `;

            const marker = L.marker([company.lat, company.lng], { icon: customIcon }).bindPopup(popupContent).addTo(map);
            markers.push(marker);
        });
    }

    // --- 4. Otwieranie Strony Szczegółów ---
    function openDetails(companyId) {
        const company = companies.find(c => c.id === companyId);
        const container = document.getElementById('details-content-area');
        
        const isSaved = savedWorkshops.some(saved => saved.id === company.id);
        const btnHtml = isSaved 
            ? `<button class="btn-primary btn-ticket" disabled>Jesteś na liście! ✓</button>`
            : `<button class="btn-primary btn-ticket" id="detail-signup-btn" onclick="detailsSignUp(${company.id})">Zapisz się teraz</button>`;

        const scheduleHtml = company.schedule.map(s => `
            <li><span class="schedule-time">${s.time}</span><span class="schedule-desc">${s.event}</span></li>
        `).join('');

        container.innerHTML = `
            <button class="back-btn" onclick="switchView('map')">← Wróć do mapy</button>
            
            <div class="detail-banner">
                <div class="detail-banner-icon">${company.icon}</div>
                <div class="detail-banner-text">
                    <h3>${company.name}</h3>
                    <h1>${company.title}</h1>
                </div>
            </div>

            <div class="detail-layout">
                <div class="detail-left">
                    <section>
                        <h2>📖 O warsztacie</h2>
                        <p>${company.fullDesc}</p>
                    </section>
                    <section>
                        <h2>⏱️ Harmonogram dnia</h2>
                        <ul class="schedule-list">${scheduleHtml}</ul>
                    </section>
                </div>

                <div class="detail-right">
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <p>Termin wizyty</p>
                            <h3>${company.date}</h3>
                            <p style="margin-top:4px; font-weight:800; color:var(--deep-black);">${company.time}</p>
                        </div>
                        
                        ${!isSaved ? `
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="terms-checkbox">
                            <label for="terms-checkbox">Akceptuję <a>Regulamin wydarzenia</a> oraz wyrażam zgodę na przetwarzanie danych w celu rekrutacji.</label>
                        </div>
                        ` : '<div style="margin-bottom:20px; font-weight:800; color:var(--text-muted); text-align:center;">Miejsce zarezerwowane 🎉</div>'}
                        
                        ${btnHtml}
                    </div>
                </div>
            </div>
        `;

        switchView('details');
        window.scrollTo(0, 0); // Przewiń na górę po otwarciu
    }

    // --- 5. Logika Zapisów ---
    function quickSignUp(companyId, btnElement) {
        processSignUp(companyId);
        btnElement.innerHTML = "Zapisano ✓";
        btnElement.disabled = true;
    }

    function detailsSignUp(companyId) {
        const checkbox = document.getElementById('terms-checkbox');
        if (!checkbox.checked) {
            alert("Aby się zapisać, musisz zaakceptować regulamin! 📜");
            return;
        }
        
        processSignUp(companyId);
        
        // Aktualizacja UI w karcie po kliknięciu
        const btn = document.getElementById('detail-signup-btn');
        btn.innerHTML = "Jesteś na liście! ✓";
        btn.disabled = true;
        document.querySelector('.checkbox-wrapper').style.display = 'none';
        alert("Świetnie! Twoje miejsce jest zarezerwowane. Sprawdź profil.");
    }

    function processSignUp(companyId) {
        const company = companies.find(c => c.id === companyId);
        if (!savedWorkshops.includes(company)) {
            savedWorkshops.push(company);
            renderUpcoming();
            renderMarkers(); // Odśwież by przyciski w pop-upach też zniknęły
        }
    }

    // --- 6. Renderowanie nadchodzących w Profilu ---
    function renderUpcoming() {
        const listContainer = document.getElementById('upcoming-list');
        if (savedWorkshops.length === 0) {
            listContainer.innerHTML = `<div style="grid-column: 1/-1; padding: 20px; border: 2px dashed var(--border-light); border-radius: 16px; text-align: center; color: var(--text-muted); font-weight: 600;">Brak nadchodzących wizyt. Przejdź na mapę!</div>`;
            return;
        }
        listContainer.innerHTML = savedWorkshops.map(company => `
            <div class="upcoming-card">
                <div class="uc-icon">${company.icon}</div>
                <div class="uc-info">
                    <h4>${company.title}</h4>
                    <p>🏢 ${company.name} | 📅 ${company.date}</p>
                </div>
            </div>
        `).join('');
    }

    // --- 7. Przełączanie widoków ---
    function switchView(viewId, navBtn = null) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        
        if(navBtn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            navBtn.classList.add('active');
        } else if (viewId === 'map' || viewId === 'profile') {
            // Automatyczne zaznaczenie przycisku w sidebarze jeśli użyto "Wróć"
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.nav-btn')[viewId === 'map' ? 0 : 1].classList.add('active');
        }
        
        if(viewId === 'map') { setTimeout(() => map.invalidateSize(), 100); }
    }

    // Start
    renderMarkers();
    renderUpcoming();
</script>
</body>
</html>
